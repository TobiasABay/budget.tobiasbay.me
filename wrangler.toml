name = "budget-tobiasbay-me"
compatibility_date = "2025-12-14"
pages_build_output_dir = "./dist"

# Taggun receipt OCR — value must NOT be in this file. Set for Production:
#   npx wrangler pages secret put TAGGUN_API_KEY --project-name budget-tobiasbay-me
# or Dashboard → Variables and Secrets → Production → Secret. Then redeploy.
# Local: .dev.vars
#
# Note: Avoid a redundant [env.production] block that only duplicates top-level [vars] / d1:
# with wrangler.toml as the config source of truth, that pattern can prevent dashboard/CLI
# secrets from being merged into production Functions.

[vars]
FRONTEND_URL = "https://budget.tobiasbay.me"

[[d1_databases]]
binding = "budget_db"
database_name = "budget-db"
database_id = "f2aa434c-95b2-495b-bfa4-e10778b2d7a4"

